<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowMind AI — Workflow Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
    rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #16161f;
      --border: #1e1e2e;
      --border2: #2a2a3e;
      --accent: #7c6af7;
      --accent2: #a78bfa;
      --accent3: #38bdf8;
      --green: #34d399;
      --orange: #fb923c;
      --pink: #f472b6;
      --yellow: #fbbf24;
      --text: #e8e8f0;
      --text2: #9090a8;
      --text3: #5a5a72;
      --glow: rgba(124, 106, 247, 0.15);
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    #root {
      height: 100%;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 4px;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse-ring {
      0% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(124, 106, 247, 0.5);
      }

      70% {
        transform: scale(1);
        box-shadow: 0 0 0 10px rgba(124, 106, 247, 0);
      }

      100% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(124, 106, 247, 0);
      }
    }

    @keyframes shimmer {
      0% {
        background-position: -200% center;
      }

      100% {
        background-position: 200% center;
      }
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-12px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .app {
      display: grid;
      grid-template-columns: 260px 1fr;
      grid-template-rows: 56px 1fr;
      height: 100vh;
      gap: 0;
    }

    /* ── TOPBAR ── */
    .topbar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: relative;
      z-index: 10;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -0.3px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse-ring 2s infinite;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .api-badge {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text3);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 20px;
    }

    .api-badge.connected {
      color: var(--green);
      border-color: rgba(52, 211, 153, 0.3);
      background: rgba(52, 211, 153, 0.05);
    }

    /* ── API KEY MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: fadeUp 0.3s ease;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 16px;
      padding: 36px;
      width: 440px;
      max-width: 95vw;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6), 0 0 0 1px var(--border);
    }

    .modal h2 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 22px;
      margin-bottom: 8px;
    }

    .modal p {
      color: var(--text2);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .modal a {
      color: var(--accent2);
      text-decoration: none;
    }

    .modal a:hover {
      text-decoration: underline;
    }

    .input-group {
      margin-bottom: 16px;
    }

    .input-group label {
      display: block;
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 6px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.5px;
    }

    .input-group input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-group input:focus {
      border-color: var(--accent);
    }

    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }

    .btn-primary:hover {
      background: var(--accent2);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(124, 106, 247, 0.35);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px 12px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .sidebar-section-label {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      color: var(--text3);
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 8px 10px 6px;
      margin-top: 8px;
    }

    .sidebar-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid transparent;
      background: transparent;
      width: 100%;
      text-align: left;
      color: var(--text2);
      font-size: 13.5px;
      font-family: 'DM Sans', sans-serif;
    }

    .sidebar-btn:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .sidebar-btn.active {
      background: var(--glow);
      border-color: rgba(124, 106, 247, 0.25);
      color: var(--accent2);
    }

    .sidebar-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .sidebar-btn.active .sidebar-icon {
      background: rgba(124, 106, 247, 0.2);
    }

    /* ── MAIN ── */
    .main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
      position: relative;
    }

    /* Grid bg */
    .main::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      pointer-events: none;
    }

    /* ── WORKFLOW HEADER ── */
    .workflow-header {
      padding: 24px 28px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: relative;
      z-index: 1;
    }

    .workflow-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 20px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .workflow-desc {
      color: var(--text2);
      font-size: 13px;
    }

    /* ── MESSAGES ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      position: relative;
      z-index: 1;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: var(--text3);
      animation: fadeUp 0.5s ease;
    }

    .empty-icon {
      font-size: 40px;
      opacity: 0.4;
    }

    .empty-state h3 {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      color: var(--text2);
      font-weight: 600;
    }

    .empty-state p {
      font-size: 13px;
      text-align: center;
      max-width: 280px;
      line-height: 1.6;
    }

    /* Quick prompts */
    .quick-prompts {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }

    .quick-chip {
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border2);
      background: var(--surface);
      color: var(--text2);
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }

    .quick-chip:hover {
      border-color: var(--accent);
      color: var(--accent2);
      background: var(--glow);
    }

    /* Message bubbles */
    .message {
      display: flex;
      gap: 12px;
      animation: fadeUp 0.3s ease;
      max-width: 800px;
    }

    .message.user {
      flex-direction: row-reverse;
      align-self: flex-end;
    }

    .message.assistant {
      align-self: flex-start;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .avatar.user {
      background: var(--accent);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 12px;
    }

    .avatar.ai {
      background: var(--surface2);
      border: 1px solid var(--border2);
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.7;
      max-width: 620px;
    }

    .message.user .bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 4px;
      white-space: pre-wrap;
      font-family: 'DM Sans', sans-serif;
    }

    .bubble-label {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.8px;
      color: var(--text3);
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    /* Typing indicator */
    .typing {
      display: flex;
      gap: 4px;
      padding: 8px 4px;
      align-items: center;
    }

    .typing span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 1.2s infinite;
    }

    .typing span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing span:nth-child(3) {
      animation-delay: 0.4s;
    }

    /* ── INPUT AREA ── */
    .input-area {
      padding: 16px 28px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg);
      position: relative;
      z-index: 1;
    }

    .input-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 10px 12px;
      transition: border-color 0.2s;
    }

    .input-wrapper:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow);
    }

    .input-wrapper textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      resize: none;
      max-height: 140px;
      min-height: 24px;
      line-height: 1.6;
    }

    .input-wrapper textarea::placeholder {
      color: var(--text3);
    }

    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--accent);
      border: none;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
      font-size: 16px;
    }

    .send-btn:hover {
      background: var(--accent2);
      transform: scale(1.05);
    }

    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .send-btn.loading svg {
      animation: spin 0.8s linear infinite;
    }

    .input-hint {
      font-size: 11px;
      color: var(--text3);
      margin-top: 8px;
      font-family: 'DM Mono', monospace;
      display: flex;
      justify-content: space-between;
    }

    /* Workflow color accents */
    .wf-chat {
      --wf: #7c6af7;
    }

    .wf-email {
      --wf: #38bdf8;
    }

    .wf-summary {
      --wf: #34d399;
    }

    .wf-plan {
      --wf: #fb923c;
    }

    .wf-code {
      --wf: #f472b6;
    }

    .wf-linkedin {
      --wf: #fbbf24;
    }

    .wf-search {
      --wf: #a78bfa;
    }

    .sidebar-btn.active {
      color: var(--wf, var(--accent2));
    }

    .sidebar-btn.active .sidebar-icon {
      background: color-mix(in srgb, var(--wf, var(--accent)) 15%, transparent);
    }

    .workflow-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--wf, var(--accent));
      flex-shrink: 0;
    }

    /* Code formatting in assistant bubbles */
    .message.assistant .bubble code {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      background: rgba(0, 0, 0, 0.3);
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--accent2);
    }

    /* Copy button */
    .copy-btn {
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--text3);
      background: transparent;
      border: 1px solid var(--border);
      padding: 3px 8px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
      margin-top: 8px;
      display: inline-block;
    }

    .copy-btn:hover {
      color: var(--text);
      border-color: var(--border2);
    }

    @media (max-width: 640px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: 56px auto 1fr;
      }

      .sidebar {
        display: flex;
        flex-direction: row;
        overflow-x: auto;
        padding: 8px;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      .sidebar-section-label {
        display: none;
      }

      .sidebar-btn span.label {
        display: none;
      }

      .sidebar-btn {
        padding: 8px;
        min-width: 44px;
        justify-content: center;
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    const WORKFLOWS = [
      {
        id: 'chat',
        label: 'Free Chat',
        icon: '💬',
        cls: 'wf-chat',
        desc: 'Ask anything — general AI assistant',
        placeholder: 'Ask me anything...',
        systemPrompt: `You are FlowMind AI, a smart and concise AI assistant. Be helpful, direct, and clear. Format your responses well using line breaks for readability.`,
        quickPrompts: ['What is prompt engineering?', 'Explain LLMs simply', 'What is an AI agent?']
      },
      {
        id: 'email',
        label: 'Email Generator',
        icon: '✉️',
        cls: 'wf-email',
        desc: 'Generate professional emails instantly',
        placeholder: 'Describe the email you need (e.g. "Follow-up email to a client who hasn\'t replied in 5 days")',
        systemPrompt: `You are an expert email writer. When given a brief description, generate a professional, clear, and well-structured email. Include: Subject line, greeting, body, and sign-off. Keep it concise and compelling. After the email, add a short note with 1-2 tips to improve it.`,
        quickPrompts: ['Follow-up after job interview', 'Asking for a salary raise', 'Cold outreach to a startup founder']
      },
      {
        id: 'summary',
        label: 'Text Summarizer',
        icon: '📄',
        cls: 'wf-summary',
        desc: 'Summarize any text into key points',
        placeholder: 'Paste the text you want to summarize...',
        systemPrompt: `You are a precise summarizer. When given text, extract the most important information and present it as:
1. A 1-2 sentence TL;DR
2. Key Points (bullet format, max 5)
3. Actionable Takeaway (if any)
Be concise. Cut fluff. Preserve meaning.`,
        quickPrompts: ['Summarize a news article', 'Summarize a research paper abstract', 'Summarize meeting notes']
      },
      {
        id: 'plan',
        label: 'Action Plan',
        icon: '🗓️',
        cls: 'wf-plan',
        desc: 'Turn goals into structured action plans',
        placeholder: 'What\'s your goal? (e.g. "Learn React in 30 days", "Launch a product in 2 weeks")',
        systemPrompt: `You are a strategic planning expert. When given a goal, create a clear, realistic action plan with:
- Timeline breakdown (days/weeks)
- Specific milestones
- Daily or weekly tasks
- Resources needed
- Potential blockers & how to avoid them
Make it motivating, specific, and achievable.`,
        quickPrompts: ['Learn machine learning in 60 days', 'Build a portfolio website in 2 weeks', 'Prepare for a job interview in 7 days']
      },
      {
        id: 'code',
        label: 'Code Explainer',
        icon: '💻',
        cls: 'wf-code',
        desc: 'Explain, debug, or improve code',
        placeholder: 'Paste your code or describe what you need...',
        systemPrompt: `You are a senior software engineer and expert code explainer. When given code:
1. Explain what it does in plain English
2. Break down key concepts line by line (if needed)
3. Point out any bugs or improvements
4. Suggest better alternatives if applicable
 
When asked to write code, write clean, commented, production-ready code with explanations.`,
        quickPrompts: ['Explain async/await in JS', 'What is Big O notation?', 'Explain React useEffect hook']
      },
      {
        id: 'linkedin',
        label: 'LinkedIn / Captions',
        icon: '🔗',
        cls: 'wf-linkedin',
        desc: 'Create viral LinkedIn posts & social captions',
        placeholder: 'What do you want to post about? (e.g. "Got my first job in tech", "Lessons from failing a startup")',
        systemPrompt: `You are a top LinkedIn content strategist who writes viral, authentic posts that get thousands of reactions.
 
When given a topic, write 3 variations:
1. 🔥 HOOK-DRIVEN (starts with a bold statement or question)
2. 📖 STORYTELLING (personal narrative, emotional)
3. 💡 VALUE-FIRST (tips, insights, data-backed)
 
For each, include:
- The post text (ready to copy-paste)
- 5 relevant hashtags
- Best time to post tip
 
Keep tone professional yet human. No corporate jargon. Short sentences. White space. Emojis used sparingly.`,
        quickPrompts: ['Just landed my first tech job', '5 lessons from building a side project', 'Why I switched careers to AI']
      },
      {
        id: 'search',
        label: 'Quick Answer',
        icon: '🔍',
        cls: 'wf-search',
        desc: 'Get one-line factual answers fast',
        placeholder: 'Ask a factual question for a sharp, concise answer...',
        systemPrompt: `You are a concise knowledge assistant. Answer every question in ONE clear sentence or at most 2-3 sentences. No fluff, no lengthy explanations unless explicitly asked. Add a "Want to know more?" follow-up suggestion at the end.`,
        quickPrompts: ['What is RAG in AI?', 'What does a prompt engineer do?', 'Difference between ML and DL?']
      }
    ];

    function App() {
      const [apiKey, setApiKey] = useState(() => localStorage.getItem('gemini_key') || '');
      const [keyInput, setKeyInput] = useState('');
      const [showModal, setShowModal] = useState(false);
      const [activeWF, setActiveWF] = useState(WORKFLOWS[0]);
      const [chats, setChats] = useState({});
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const messagesEnd = useRef(null);
      const textareaRef = useRef(null);

      const currentMessages = chats[activeWF.id] || [];

      useEffect(() => {
        if (!apiKey) setShowModal(true);
      }, []);

      useEffect(() => {
        messagesEnd.current?.scrollIntoView({ behavior: 'smooth' });
      }, [chats, loading]);

      const handleSaveKey = () => {
        const k = keyInput.trim();
        if (!k) return;
        localStorage.setItem('gemini_key', k);
        setApiKey(k);
        setShowModal(false);
      };

      const autoResize = () => {
        const t = textareaRef.current;
        if (!t) return;
        t.style.height = 'auto';
        t.style.height = Math.min(t.scrollHeight, 140) + 'px';
      };

      const callGemini = async (messages, systemPrompt) => {
        const contents = messages.map(m => ({
          role: m.role === 'assistant' ? 'model' : 'user',
          parts: [{ text: m.content }]
        }));

        const res = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              system_instruction: { parts: [{ text: systemPrompt }] },
              contents,
              generationConfig: { temperature: 0.85, maxOutputTokens: 1200 }
            })
          }
        );
        const data = await res.json();
        if (data.error) throw new Error(data.error.message);
        return data.candidates?.[0]?.content?.parts?.[0]?.text || 'No response generated.';
      };

      const sendMessage = async (text) => {
        const msg = text || input.trim();
        if (!msg || loading) return;
        if (!apiKey) { setShowModal(true); return; }

        const userMsg = { role: 'user', content: msg };
        const updatedMsgs = [...currentMessages, userMsg];

        setChats(c => ({ ...c, [activeWF.id]: updatedMsgs }));
        setInput('');
        if (textareaRef.current) textareaRef.current.style.height = 'auto';
        setLoading(true);

        try {
          const reply = await callGemini(updatedMsgs, activeWF.systemPrompt);
          setChats(c => ({
            ...c,
            [activeWF.id]: [...(c[activeWF.id] || []), { role: 'assistant', content: reply }]
          }));
        } catch (e) {
          setChats(c => ({
            ...c,
            [activeWF.id]: [...(c[activeWF.id] || []), {
              role: 'assistant',
              content: `⚠️ Error: ${e.message}\n\nCheck your API key or try again.`
            }]
          }));
        } finally {
          setLoading(false);
        }
      };

      const clearChat = () => setChats(c => ({ ...c, [activeWF.id]: [] }));

      const copyText = (text) => {
        navigator.clipboard.writeText(text);
      };

      return (
        <div className="app">
          {/* API Key Modal */}
          {showModal && (
            <div className="modal-overlay">
              <div className="modal">
                <h2>🔑 Connect Gemini API</h2>
                <p>
                  Enter your free Google Gemini API key to power the AI workflows.
                  Get yours at <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com</a>
                </p>
                <div className="input-group">
                  <label>GEMINI API KEY</label>
                  <input
                    type="password"
                    placeholder="AIza..."
                    value={keyInput}
                    onChange={e => setKeyInput(e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && handleSaveKey()}
                    autoFocus
                  />
                </div>
                <button className="btn-primary" onClick={handleSaveKey} disabled={!keyInput.trim()}>
                  Connect & Launch →
                </button>
                {apiKey && (
                  <button style={{ width: '100%', marginTop: 10, background: 'transparent', border: '1px solid var(--border)', color: 'var(--text2)', borderRadius: 8, padding: 10, cursor: 'pointer', fontFamily: 'DM Sans', fontSize: 13 }}
                    onClick={() => setShowModal(false)}>
                    Cancel
                  </button>
                )}
              </div>
            </div>
          )}

          {/* Topbar */}
          <div className="topbar">
            <div className="logo">
              <div className="logo-dot" />
              FlowMind AI
            </div>
            <div className="topbar-right">
              <span className={`api-badge ${apiKey ? 'connected' : ''}`}>
                {apiKey ? '● Gemini Connected' : '○ Not Connected'}
              </span>
              <button
                onClick={() => setShowModal(true)}
                style={{ background: 'var(--surface)', border: '1px solid var(--border2)', color: 'var(--text2)', padding: '5px 12px', borderRadius: 6, cursor: 'pointer', fontSize: 12, fontFamily: 'DM Sans' }}
              >
                {apiKey ? '🔑 Change Key' : '🔑 Add Key'}
              </button>
              {currentMessages.length > 0 && (
                <button onClick={clearChat}
                  style={{ background: 'transparent', border: '1px solid var(--border)', color: 'var(--text3)', padding: '5px 12px', borderRadius: 6, cursor: 'pointer', fontSize: 12, fontFamily: 'DM Sans' }}>
                  Clear
                </button>
              )}
            </div>
          </div>

          {/* Sidebar */}
          <div className="sidebar">
            <div className="sidebar-section-label">Workflows</div>
            {WORKFLOWS.map(wf => (
              <button
                key={wf.id}
                className={`sidebar-btn ${wf.cls} ${activeWF.id === wf.id ? 'active' : ''}`}
                onClick={() => { setActiveWF(wf); setInput(''); }}
              >
                <div className="sidebar-icon">{wf.icon}</div>
                <span className="label">{wf.label}</span>
              </button>
            ))}
          </div>

          {/* Main */}
          <div className={`main ${activeWF.cls}`}>
            <div className="workflow-header">
              <div className="workflow-title">
                <div className="workflow-dot" />
                {activeWF.icon} {activeWF.label}
              </div>
              <div className="workflow-desc">{activeWF.desc}</div>
            </div>

            <div className="messages">
              {currentMessages.length === 0 ? (
                <div className="empty-state">
                  <div className="empty-icon">{activeWF.icon}</div>
                  <h3>{activeWF.label}</h3>
                  <p>{activeWF.desc}</p>
                  <div className="quick-prompts">
                    {activeWF.quickPrompts.map(q => (
                      <button key={q} className="quick-chip" onClick={() => sendMessage(q)}>{q}</button>
                    ))}
                  </div>
                </div>
              ) : (
                currentMessages.map((m, i) => (
                  <div key={i} className={`message ${m.role === 'user' ? 'user' : 'assistant'}`}>
                    <div className={`avatar ${m.role === 'user' ? 'user' : 'ai'}`}>
                      {m.role === 'user' ? 'U' : '🤖'}
                    </div>
                    <div>
                      <div className="bubble-label">
                        {m.role === 'user' ? 'You' : 'FlowMind AI'}
                      </div>
                      <div className="bubble">{m.content}</div>
                      {m.role === 'assistant' && (
                        <button className="copy-btn" onClick={() => copyText(m.content)}>
                          Copy
                        </button>
                      )}
                    </div>
                  </div>
                ))
              )}
              {loading && (
                <div className="message assistant">
                  <div className="avatar ai">🤖</div>
                  <div>
                    <div className="bubble-label">FlowMind AI</div>
                    <div className="bubble">
                      <div className="typing">
                        <span /><span /><span />
                      </div>
                    </div>
                  </div>
                </div>
              )}
              <div ref={messagesEnd} />
            </div>

            <div className="input-area">
              <div className="input-wrapper">
                <textarea
                  ref={textareaRef}
                  rows={1}
                  value={input}
                  onChange={e => { setInput(e.target.value); autoResize(); }}
                  onKeyDown={e => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                      e.preventDefault();
                      sendMessage();
                    }
                  }}
                  placeholder={activeWF.placeholder}
                />
                <button className={`send-btn ${loading ? 'loading' : ''}`} onClick={() => sendMessage()} disabled={loading || !input.trim()}>
                  {loading ? (
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
                      <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" />
                    </svg>
                  ) : (
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
                      <line x1="22" y1="2" x2="11" y2="13" /><polygon points="22 2 15 22 11 13 2 9 22 2" />
                    </svg>
                  )}
                </button>
              </div>
              <div class="input-hint">
                <span>↵ Enter to send · Shift+Enter for new line</span>
                <span style={{ color: 'var(--wf, var(--accent))' }}>Gemini 1.5 Flash</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
